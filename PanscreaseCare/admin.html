<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內容管理後台 - 胰臟癌照護網</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f1f5f9; padding-top: 40px; }
        .admin-container { max-width: 900px; margin: 0 auto 40px; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .admin-section { background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .admin-section h3 { color: #6b8ead; margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 22px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #334155; }
        .form-group input[type="text"], .form-group input[type="url"], .form-group textarea, .form-group select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 15px; }
        .form-group input[type="file"] { padding: 10px; background: #fff; border: 1px dashed #cbd5e1; border-radius: 8px; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; font-size: 15px; }
        .image-preview-box { margin-top: 10px; text-align: center; background: #e2e8f0; padding: 10px; border-radius: 8px; display: none; }
        .image-preview-box img { max-width: 100%; max-height: 200px; border-radius: 4px; object-fit: cover; }
        .article-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; border-radius: 8px; overflow: hidden; }
        .article-table th, .article-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        .article-table th { background-color: #6b8ead; color: white; font-weight: bold; }
        .article-table tr:hover { background-color: #f1f5f9; }
        .action-btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; margin-right: 5px; }
        .btn-edit { background-color: #e2b96b; color: white; } .btn-delete { background-color: #e08787; color: white; }
        .edit-mode-banner { background-color: #fef08a; color: #b45309; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; display: none; justify-content: space-between; align-items: center; }
        
        /* 富文本編輯器樣式 */
        .editor-toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 15px; background: #f8fafc; border: 1px solid #cbd5e1; border-bottom: none; border-radius: 8px 8px 0 0; align-items: center; }
        .editor-toolbar button { background: #fff; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 12px; cursor: pointer; color: #4a5568; font-weight: bold; transition: 0.2s; font-size: 14px; }
        .editor-toolbar button:hover { background: #e2e8f0; color: #6b8ead; }
        .editor-toolbar select { padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px; color: #4a5568; outline: none; cursor: pointer; }
        .editor-toolbar input[type="color"] { border: none; width: 32px; height: 32px; padding: 0; background: none; cursor: pointer; border-radius: 4px; }
        .rich-editor { border: 1px solid #cbd5e1; border-radius: 0 0 8px 8px; padding: 15px; min-height: 280px; background: #fff; overflow-y: auto; color: #334155; font-size: 16px; line-height: 1.7; }
        .rich-editor:focus { outline: none; border-color: #6b8ead; box-shadow: inset 0 0 0 2px rgba(107, 142, 173, 0.1); }
        .rich-editor[placeholder]:empty:before { content: attr(placeholder); color: #94a3b8; pointer-events: none; }
        .rich-editor a { color: #005b9f; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h2 style="color: #4a5568; font-size: 28px; margin-bottom: 10px;">⚙️ 胰臟癌照護網 - 內容管理系統 (CMS)</h2>
        </div>

        <div class="admin-section" style="background-color: #f0f7ff; border-color: #7aa1c2;">
            <h3 style="color: #52728f;">🏠 首頁精選版位快速設定</h3>
            <p style="color: #829ab1; font-size: 14px; margin-top: -10px; margin-bottom: 20px;">提示：您也可以在下方的「管理已發布文章」列表中，直接將特定的 News/Video 設為首頁！</p>
            
            <div class="form-group" style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <label style="color: #6b8ead; font-size: 18px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">📰 方格子 (News) 版位</label>
                <input type="text" id="news-title" placeholder="輸入方格子文章標題" style="margin-top:15px;">
                <textarea id="news-summary" placeholder="輸入文章摘要..." style="height: 80px; margin-top:15px; width:100%; border:1px solid #cbd5e1; border-radius:8px; padding:10px;"></textarea>
                <input type="url" id="news-url" placeholder="方格子文章連結 (https://vocus.cc/...)" style="margin-top:15px;">
                <input type="url" id="news-image-url" placeholder="圖片網址 (https://...)" style="margin-top:15px;">
            </div>

            <div class="form-group" style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 20px;">
                <label style="color: #6b8ead; font-size: 18px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">🎞️ YouTube (Video) 版位</label>
                <input type="text" id="video-title" placeholder="輸入 YouTube 影片標題" style="margin-top:15px;">
                <textarea id="video-summary" placeholder="輸入影片簡短介紹" style="height: 80px; margin-top:15px; width:100%; border:1px solid #cbd5e1; border-radius:8px; padding:10px;"></textarea>
                <input type="url" id="video-url" placeholder="YouTube 影片網址 (https://www.youtube.com/watch?v=...)" style="margin-top:15px;">
            </div>

            <button id="btn-save-home" class="btn-pill large full-width" style="background-color: #6b8ead;">💾 儲存首頁快速更新</button>
            <div id="home-status-msg" class="status-msg"></div>
        </div>

        <div class="admin-section" style="border-color: #f6d6b8; background-color: #fffaf5;">
            <h3 style="color: #d08c5c;">📚 新增/編輯文章資料庫 (含熱門新知與影片)</h3>
            
            <div id="edit-mode-banner" class="edit-mode-banner">
                <span>⚠️ 目前為「編輯模式」，儲存將會覆寫原本的內容。</span>
                <button id="btn-cancel-edit" class="action-btn" style="background:#b45309; color:white;">取消編輯</button>
            </div>
            <input type="hidden" id="edit-article-id" value="">

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>📌 選擇主分類</label>
                    <select id="article-category">
                        <option value="">請選擇主分類...</option>
                        <option value="about-pancreas">認識胰臟</option>
                        <option value="cancer-analysis">胰臟癌解析</option>
                        <option value="diagnosis">精準診斷</option>
                        <option value="treatment">治療與照護</option>
                        <option value="news" style="color:var(--primary); font-weight:bold;">📰 News (熱門新知)</option>
                        <option value="video" style="color:var(--primary); font-weight:bold;">🎞️ Video (影音專區)</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>📂 選擇子分類</label>
                    <select id="article-subcategory">
                        <option value="">請先選擇主分類...</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>✏️ 文章/影片 標題</label>
                <input type="text" id="article-title" placeholder="例如：為什麼電腦斷層容易漏看早期胰臟癌？">
            </div>
            
            <div class="form-group">
                <label>🖼️ 縮圖 (二選一：上傳圖片 或 貼上網址)</label>
                <input type="file" id="article-image-file" accept="image/png, image/jpeg">
                <input type="url" id="article-image-url" placeholder="或直接貼上圖片網址 (https://...)">
                <input type="hidden" id="article-image-base64"> 
                <div id="image-preview" class="image-preview-box"></div>
            </div>
            
            <div class="form-group">
                <label>📝 內文 (Video 請輸入簡介，News/文章 請自由排版)</label>
                <div class="editor-toolbar">
                    <button type="button" onclick="execCmd('bold')"><b>B</b></button>
                    <button type="button" onclick="execCmd('italic')"><i>I</i></button>
                    <button type="button" onclick="execCmd('underline')"><u>U</u></button>
                    <div style="width: 1px; height: 20px; background: #cbd5e1; margin: 0 5px;"></div>
                    <select onchange="execCmd('fontSize', this.value); this.selectedIndex=0;">
                        <option value="">選擇大小</option><option value="3">正常</option><option value="4">中大</option><option value="5">大標</option><option value="6">特大</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span style="font-size: 14px; color: #64748b;">顏色:</span>
                        <input type="color" onchange="execCmd('foreColor', this.value)">
                    </div>
                    <div style="width: 1px; height: 20px; background: #cbd5e1; margin: 0 5px;"></div>
                    <button type="button" onclick="insertLink()">🔗 連結</button>
                    <button type="button" onclick="execCmd('unlink')">🚫 移除連結</button>
                </div>
                <div id="article-content-editor" class="rich-editor" contenteditable="true" placeholder="在此輸入內容..."></div>
            </div>

            <div class="form-group">
                <label id="reference-label">🔗 參考資料來源 (可貼網址)</label>
                <input type="text" id="article-reference" placeholder="若為 News 或 Video 必填對應的方格子或 YouTube 連結！">
            </div>

            <button id="btn-save-article" class="btn-pill large full-width" style="background-color: #d08c5c;">📤 發布/儲存至資料庫</button>
            <div id="article-status-msg" class="status-msg"></div>
        </div>

        <div class="admin-section">
            <h3>📋 管理已發布的資料庫文章</h3>
            <div style="overflow-x: auto;">
                <table class="article-table">
                    <thead><tr><th style="width: 25%">分類</th><th style="width: 45%">標題</th><th style="width: 30%">操作</th></tr></thead>
                    <tbody id="article-list-body"><tr><td colspan="3" style="text-align:center; color:#829ab1;">載入中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function execCmd(command, value = null) { document.execCommand(command, false, value); document.getElementById('article-content-editor').focus(); }
        function insertLink() { const url = prompt("請輸入超連結網址:"); if (url) document.execCommand("createLink", false, url); document.getElementById('article-content-editor').focus(); }

        const subcategoryMap = {
            'about-pancreas': ['解剖與機能', '症狀與病徵', '各類胰臟疾病'],
            'cancer-analysis': ['歷史與概說', '流行病學與危險因子'],
            'diagnosis': ['實驗室抽血檢查', '影像學與進階檢查', '早期發現與 AI 突破'],
            'treatment': ['外科手術與移植', '內科精準治療', '醫病共享決策'],
            'news': ['熱門新知文章'],
            'video': ['YouTube影片']
        };

        document.getElementById('article-category').addEventListener('change', function() { 
            populateSubcategory(this.value, ''); 
            const refLabel = document.getElementById('reference-label');
            if (this.value === 'news' || this.value === 'video') {
                refLabel.innerHTML = '🔗 <strong>文章/影片 對外連結 (URL) <span style="color:red">*重要</span></strong>';
            } else {
                refLabel.innerHTML = '🔗 參考資料來源 (可貼網址)';
            }
        });
        function populateSubcategory(category, selectedSub) {
            const subSelect = document.getElementById('article-subcategory');
            subSelect.innerHTML = '<option value="">請選擇子分類...</option>';
            if (subcategoryMap[category]) {
                subcategoryMap[category].forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub; option.textContent = sub;
                    if (sub === selectedSub) option.selected = true;
                    subSelect.appendChild(option);
                });
            }
        }

        document.getElementById('article-image-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('article-image-url').value = '';
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    let quality = 0.7;
                    let base64String = canvas.toDataURL('image/jpeg', quality);
                    while(base64String.length > 45000 && quality > 0.1) { quality -= 0.1; base64String = canvas.toDataURL('image/jpeg', quality); }
                    if(base64String.length > 48000) { alert("圖片太複雜，請改貼網址！"); document.getElementById('article-image-file').value = ''; return; }
                    document.getElementById('article-image-base64').value = base64String;
                    document.getElementById('image-preview').innerHTML = `<img src="${base64String}">`;
                    document.getElementById('image-preview').style.display = 'block';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('article-image-url').addEventListener('input', function() {
            if(this.value) { document.getElementById('article-image-file').value = ''; document.getElementById('article-image-base64').value = ''; document.getElementById('image-preview').style.display = 'none'; }
        });

        document.addEventListener('DOMContentLoaded', async () => { fetchHomepageContent(); loadArticlesList(); });

        async function fetchHomepageContent() {
            try {
                const res = await fetch(CONFIG.GAS_URL + "?action=getContent", { method: 'GET' });
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('news-title').value = result.data.news.title || "";
                    document.getElementById('news-summary').value = result.data.news.summary || "";
                    document.getElementById('news-url').value = result.data.news.url || "";
                    document.getElementById('news-image-url').value = result.data.news.image || "";
                    document.getElementById('video-title').value = result.data.video.title || "";
                    document.getElementById('video-summary').value = result.data.video.summary || "";
                    document.getElementById('video-url').value = result.data.video.url || "";
                }
            } catch (e) {}
        }

        document.getElementById('btn-save-home').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-home'); btn.innerText = "儲存中..."; btn.disabled = true;
            const payload = {
                action: 'saveContent',
                news: { title: document.getElementById('news-title').value, summary: document.getElementById('news-summary').value, url: document.getElementById('news-url').value, image: document.getElementById('news-image-url').value },
                video: { title: document.getElementById('video-title').value, summary: document.getElementById('video-summary').value, url: document.getElementById('video-url').value }
            };
            try { await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); alert("首頁版位已更新！"); } catch (e) {} finally { btn.innerText = "💾 儲存首頁快速更新"; btn.disabled = false; }
        });

        async function loadArticlesList() {
            const tbody = document.getElementById('article-list-body');
            try {
                const res = await fetch(CONFIG.GAS_URL + "?action=getArticles", { method: 'GET' });
                const result = await res.json();
                tbody.innerHTML = '';
                if (result.status === 'success' && result.data.length > 0) {
                    window.allArticles = result.data; 
                    result.data.forEach(article => {
                        // 防呆處理：統一轉換為小寫去除空白，確保舊資料也能精準比對
                        const catCode = String(article.category || '').toLowerCase().trim();
                        
                        // 動態轉換分類名稱顯示 (如果是未知的代碼，直接顯示原本的字)
                        const categoryOptions = Array.from(document.querySelectorAll('#article-category option'));
                        const matchOpt = categoryOptions.find(opt => opt.value.toLowerCase() === catCode);
                        const categoryDisplay = matchOpt ? matchOpt.text : article.category;
                        
                        let actionBtns = `
                            <button class="action-btn btn-edit" onclick="editArticle(${article.id})">編輯</button>
                            <button class="action-btn btn-delete" onclick="deleteArticle(${article.id})">刪除</button>
                        `;
                        
                        // 🌟 防呆重點：只要是 news 或 video (不論大小寫)，就一定會出現大顆的「設為首頁」按鈕！
                        if(catCode === 'news' || catCode === 'video') {
                            actionBtns += `<br><button class="action-btn" style="background-color:#0ea5e9; color:white; margin-top:8px; width: 100%; padding: 8px;" onclick="setFeatured(${article.id})">🌟 設為首頁版位</button>`;
                        }
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${categoryDisplay}</td><td>${article.title}</td><td>${actionBtns}</td>`;
                        tbody.appendChild(tr);
                    });
                } else { tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#829ab1;">尚無發布的文章</td></tr>'; }
            } catch (e) { tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#e08787;">載入失敗，請確認 API</td></tr>'; }
        }

        window.setFeatured = async function(id) {
            if (!confirm("確定要將此篇設為首頁精選嗎？這會直接覆蓋目前的版位。")) return;
            try {
                await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'setFeatured', id: id }) });
                alert("已成功更新首頁精選版位！"); fetchHomepageContent();
            } catch (e) { alert("設定請求已送出。"); }
        };

        window.editArticle = function(id) {
            const article = window.allArticles.find(a => a.id === id); if (!article) return;
            document.getElementById('edit-mode-banner').style.display = 'flex';
            document.getElementById('edit-article-id').value = article.id;
            
            // 防呆選單連動
            const catCode = String(article.category).toLowerCase().trim();
            document.getElementById('article-category').value = catCode;
            populateSubcategory(catCode, article.subcategory);
            
            document.getElementById('article-title').value = article.title;
            document.getElementById('article-reference').value = article.reference || '';
            document.getElementById('article-content-editor').innerHTML = article.content || '';
            if (article.image) {
                if(article.image.startsWith('data:image')) { document.getElementById('article-image-base64').value = article.image; document.getElementById('article-image-url').value = ''; } 
                else { document.getElementById('article-image-url').value = article.image; document.getElementById('article-image-base64').value = ''; }
                document.getElementById('image-preview').innerHTML = `<img src="${article.image}">`; document.getElementById('image-preview').style.display = 'block';
            } else { document.getElementById('article-image-base64').value = ''; document.getElementById('article-image-url').value = ''; document.getElementById('image-preview').style.display = 'none'; }
            document.getElementById('btn-save-article').innerText = "💾 儲存修改"; window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('btn-cancel-edit').addEventListener('click', resetForm);
        function resetForm() {
            document.getElementById('edit-mode-banner').style.display = 'none'; document.getElementById('edit-article-id').value = '';
            document.getElementById('article-category').value = ''; document.getElementById('article-subcategory').innerHTML = '<option value="">請先選擇主分類...</option>';
            document.getElementById('article-title').value = ''; document.getElementById('article-reference').value = '';
            document.getElementById('article-image-file').value = ''; document.getElementById('article-image-url').value = ''; document.getElementById('article-image-base64').value = ''; document.getElementById('image-preview').style.display = 'none';
            document.getElementById('article-content-editor').innerHTML = ''; document.getElementById('btn-save-article').innerText = "📤 發布/儲存至資料庫";
        }

        window.deleteArticle = async function(id) {
            if (!confirm("確定要刪除這篇文章嗎？刪除後無法復原。")) return;
            try { await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteArticle', id: id }) }); alert("文章已刪除！"); loadArticlesList(); } catch (e) {}
        };

        document.getElementById('btn-save-article').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-article'); const statusMsg = document.getElementById('article-status-msg');
            const editId = document.getElementById('edit-article-id').value;
            const category = document.getElementById('article-category').value;
            const subcategory = document.getElementById('article-subcategory').value;
            const title = document.getElementById('article-title').value;
            const content = document.getElementById('article-content-editor').innerHTML;
            const finalImage = document.getElementById('article-image-base64').value || document.getElementById('article-image-url').value;
            
            if (!category || !title || !content || content === '<br>') { alert("分類、標題與內文為必填欄位！"); return; }
            btn.innerText = "處理中..."; btn.disabled = true;

            const payload = { action: editId ? 'updateArticle' : 'saveArticle', id: editId, category: category, subcategory: subcategory, title: title, image: finalImage, content: content, reference: document.getElementById('article-reference').value };
            try { await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); statusMsg.innerText = editId ? "🎉 文章已更新！" : "🎉 文章已發布！"; statusMsg.style.color = "#78b595"; resetForm(); loadArticlesList(); } catch (e) { } finally { btn.disabled = false; }
        });
    </script>
</body>
</html>
