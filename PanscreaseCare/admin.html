<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>內容管理後台 - 胰臟癌照護網</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f1f5f9; padding-top: 40px; }
        .admin-container { max-width: 900px; margin: 0 auto 40px; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .admin-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .admin-section { background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .admin-section h3 { color: #6b8ead; margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 22px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #334155; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 15px; transition: all 0.3s; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #6b8ead; box-shadow: 0 0 0 3px rgba(107, 142, 173, 0.1); }
        .form-group textarea { resize: vertical; height: 120px; }
        .form-group textarea.large-editor { height: 300px; line-height: 1.6; }
        .status-msg { text-align: center; font-weight: bold; margin-top: 15px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h2 style="color: #4a5568; font-size: 28px; margin-bottom: 10px;">⚙️ 胰臟癌照護網 - 內容管理系統 (CMS)</h2>
            <p style="color: #829ab1;">您可以在此管理首頁精選區塊，或發布各醫學子目錄的衛教文章。</p>
        </div>

        <div class="admin-section" style="border-color: #f6d6b8; background-color: #fffaf5;">
            <h3 style="color: #d08c5c;">📚 子目錄文章發布系統</h3>
            <p style="color: #829ab1; font-size: 14px; margin-top: -10px; margin-bottom: 20px;">發布的文章將自動儲存於 Google Sheets 的「Articles」資料庫中。</p>
            
            <div class="form-group">
                <label>📌 選擇發布分類</label>
                <select id="article-category">
                    <option value="about-pancreas">認識胰臟 (解剖/機能/疾病)</option>
                    <option value="cancer-analysis">胰臟癌解析 (歷史/危險因子)</option>
                    <option value="diagnosis">精準診斷 (抽血/影像/AI)</option>
                    <option value="treatment">治療與照護 (內外科/SDM)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>✏️ 文章標題</label>
                <input type="text" id="article-title" placeholder="例如：為什麼電腦斷層容易漏看早期胰臟癌？">
            </div>
            
            <div class="form-group">
                <label>🖼️ 文章附圖網址 (Image URL)</label>
                <input type="url" id="article-image" placeholder="貼上圖片網址 (https://...)">
            </div>
            
            <div class="form-group">
                <label>📝 文章內文 (支援多段落)</label>
                <textarea id="article-content" class="large-editor" placeholder="在此輸入完整的文章內容... (可直接貼上文字，換行會自動保留)"></textarea>
            </div>

            <button id="btn-save-article" class="btn-pill large full-width" style="background-color: #d08c5c;">📤 發布文章至資料庫</button>
            <div id="article-status-msg" class="status-msg"></div>
        </div>

        <div class="admin-section">
            <h3>🏠 首頁精選版位設定 (News & Video)</h3>
            
            <div class="form-group" style="background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <label style="color: #6b8ead;">📰 方格子 (News) 版位</label>
                <input type="text" id="news-title" placeholder="文章標題" style="margin-bottom: 10px;">
                <textarea id="news-summary" placeholder="文章摘要" style="margin-bottom: 10px; height: 80px;"></textarea>
                <input type="url" id="news-url" placeholder="方格子文章連結 (https://vocus.cc/...)" style="margin-bottom: 10px;">
                <input type="url" id="news-image" placeholder="文章縮圖網址 (https://...)">
            </div>

            <div class="form-group" style="background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 20px;">
                <label style="color: #6b8ead;">🎞️ YouTube (Video) 版位</label>
                <input type="text" id="video-title" placeholder="影片標題" style="margin-bottom: 10px;">
                <textarea id="video-summary" placeholder="影片摘要" style="margin-bottom: 10px; height: 80px;"></textarea>
                <input type="url" id="video-url" placeholder="YouTube 影片連結 (https://youtu.be/...)">
            </div>

            <button id="btn-save-home" class="btn-pill large full-width">💾 儲存首頁版位更新</button>
            <div id="home-status-msg" class="status-msg"></div>
        </div>

    </div>

    <script src="config.js"></script>
    <script>
        // ==========================================
        // 1. 載入首頁現有設定
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            const statusMsg = document.getElementById('home-status-msg');
            statusMsg.innerText = "讀取首頁資料中..."; statusMsg.style.color = "#829ab1";
            try {
                const res = await fetch(CONFIG.GAS_URL + "?action=getContent", { method: 'GET' });
                const result = await res.json();
                if (result.status === 'success') {
                    document.getElementById('news-title').value = result.data.news.title || "";
                    document.getElementById('news-summary').value = result.data.news.summary || "";
                    document.getElementById('news-url').value = result.data.news.url || "";
                    document.getElementById('news-image').value = result.data.news.image || "";
                    
                    document.getElementById('video-title').value = result.data.video.title || "";
                    document.getElementById('video-summary').value = result.data.video.summary || "";
                    document.getElementById('video-url').value = result.data.video.url || "";
                    statusMsg.innerText = "";
                }
            } catch (e) {
                statusMsg.innerText = "讀取失敗，請確認 API 設定。"; statusMsg.style.color = "#e08787";
            }
        });

        // ==========================================
        // 2. 儲存首頁 News & Video 設定
        // ==========================================
        document.getElementById('btn-save-home').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-home');
            const statusMsg = document.getElementById('home-status-msg');
            btn.innerText = "儲存中..."; btn.disabled = true;

            const payload = {
                action: 'saveContent',
                news: { 
                    title: document.getElementById('news-title').value, 
                    summary: document.getElementById('news-summary').value, 
                    url: document.getElementById('news-url').value,
                    image: document.getElementById('news-image').value 
                },
                video: { 
                    title: document.getElementById('video-title').value, 
                    summary: document.getElementById('video-summary').value, 
                    url: document.getElementById('video-url').value 
                }
            };

            try {
                await fetch(CONFIG.GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                statusMsg.innerText = "✅ 首頁版位已成功更新！"; statusMsg.style.color = "#78b595";
            } catch (e) {
                statusMsg.innerText = "✅ 已送出更新請求。"; statusMsg.style.color = "#e2b96b";
            } finally {
                btn.innerText = "💾 儲存首頁版位更新"; btn.disabled = false;
            }
        });

        // ==========================================
        // 3. 發布子目錄文章 (New Feature)
        // ==========================================
        document.getElementById('btn-save-article').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-article');
            const statusMsg = document.getElementById('article-status-msg');
            
            const title = document.getElementById('article-title').value;
            const content = document.getElementById('article-content').value;
            
            if (!title || !content) {
                alert("標題與內文為必填欄位！");
                return;
            }

            btn.innerText = "發布中..."; btn.disabled = true;

            const payload = {
                action: 'saveArticle',
                category: document.getElementById('article-category').value,
                title: title,
                image: document.getElementById('article-image').value,
                content: content
            };

            try {
                await fetch(CONFIG.GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
                statusMsg.innerText = "🎉 文章已成功發布至資料庫 (Articles)！"; 
                statusMsg.style.color = "#78b595";
                
                // 發布成功後清空欄位，方便寫下一篇
                document.getElementById('article-title').value = '';
                document.getElementById('article-image').value = '';
                document.getElementById('article-content').value = '';
            } catch (e) {
                statusMsg.innerText = "🎉 已送出發布請求，請至 Google Sheets 確認。"; 
                statusMsg.style.color = "#e2b96b";
            } finally {
                btn.innerText = "📤 發布文章至資料庫"; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
