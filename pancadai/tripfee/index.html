<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出差旅費報銷系統</title>
    <!-- 引入 Bootstrap 5 與 Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Google 登入模組 (GIS) -->
    <script src="https://accounts.google.com/gsi/client" async defer data-itp_support="true"></script>
    
    <!-- 前端 PDF 合併套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    
    <!-- 讀取您的全域設定 (GAS API URL) -->
    <script src="config.js"></script>
    
    <style>
        .detail-card { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; margin-right: 10px; }
        #loginOverlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-light">

    <!-- 登入遮罩 -->
    <div id="loginOverlay">
        <h2 class="mb-4 text-primary"><i class="bi bi-briefcase-fill"></i> 出差旅費報銷系統</h2>
        <p class="text-muted mb-4">請使用 Google 帳號登入 (請允許彈出視窗)</p>
        
        <div id="g_id_onload" 
             data-client_id="470505739418-tdi7edodl65q0hpr9272kd4uof3d7l9v.apps.googleusercontent.com" 
             data-callback="handleCredentialResponse" 
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
    </div>

    <!-- 系統主介面 -->
    <div class="container py-4" id="mainApp" style="display:none; max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-primary mb-0"><i class="bi bi-airplane-engines"></i> 仲智數位健康 - 出差旅費報銷單</h3>
            <a href="dashboard.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-clock-history"></i> 歷史紀錄</a>
        </div>
        
        <form id="expenseForm">
            <!-- 基本資料與期間 -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">基本資料與出差期間</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3"><label>申請單位</label><input type="text" id="department" class="form-control" required></div>
                        <div class="col-md-3"><label>申請人</label><input type="text" id="applicant" class="form-control" readonly required></div>
                        <div class="col-md-3"><label>聯絡電話</label><input type="text" id="phone" class="form-control" required></div>
                        <div class="col-md-3"><label>總金額 (自動計算)</label><input type="number" id="totalAmount" class="form-control bg-warning text-dark fw-bold" readonly></div>
                        
                        <div class="col-md-4"><label>出差開始日期</label><input type="date" id="startDate" class="form-control" required onchange="calcDays()"></div>
                        <div class="col-md-4"><label>出差結束日期</label><input type="date" id="endDate" class="form-control" required onchange="calcDays()"></div>
                        <div class="col-md-4"><label>共計天數</label><input type="number" id="totalDays" class="form-control bg-light" readonly></div>
                        
                        <div class="col-12"><label>出差事由 (用途摘要)</label><input type="text" id="summary" class="form-control" required></div>
                    </div>
                </div>
            </div>

            <!-- 出差明細 -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <span>費用明細 (最多 10 筆)</span>
                    <button type="button" class="btn btn-sm btn-light" onclick="addDetailRow()"><i class="bi bi-plus-lg"></i> 新增一筆</button>
                </div>
                <div class="card-body" id="detailsContainer"></div>
            </div>

            <!-- 附件上傳 -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-secondary text-white">上傳憑證 (支援照片與PDF依序添加)</div>
                <div class="card-body">
                    <input type="file" id="fileInput" class="form-control mb-3" multiple accept="image/*,application/pdf" onchange="handleFiles(event)">
                    <div id="previewArea" class="d-flex flex-wrap gap-2"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fs-5" id="submitBtn"><i class="bi bi-cloud-arrow-up"></i> 送出申請並產生PDF</button>
        </form>
    </div>

    <script>
        let currentUser = null;
        let selectedFiles = [];

        // 登入驗證處理 (已修正 JWT 解碼的 Bug)
        function handleCredentialResponse(response) {
            // 🛡️ 第一步：檢查 CONFIG 是否存在（避免 config.js 載入失敗時噴 ReferenceError）
            if (typeof CONFIG === 'undefined') {
                alert('系統錯誤：config.js 未正確載入！請按 Ctrl+Shift+R (Windows) 或 Cmd+Shift+R (Mac) 強制重新整理清除快取後再試。');
                console.error('CONFIG is undefined — config.js 可能未正確載入或含有語法錯誤');
                return;
            }
            
            // 🛡️ 第二步：提取並驗證 JWT
            let payload;
            try {
                const token = response.credential;
                if (!token || typeof token !== 'string') {
                    throw new Error('無效的登入憑證 (response.credential)');
                }
                
                // 💡 修正：加上了 [1] 來精確抓取 Payload，避免 replace 出錯
                const parts = token.split('.');
                if (parts.length !== 3) {
                    throw new Error('JWT 格式錯誤：非標準的 3 段式 token');
                }
                const base64Url = parts[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                // 補齊 base64 padding（JWT 可能省略 =）
                const padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, '=');
                const jsonPayload = decodeURIComponent(atob(padded).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                payload = JSON.parse(jsonPayload);
                
                if (!payload.email) {
                    throw new Error('JWT payload 缺少 email 欄位');
                }
            } catch (jwtErr) {
                alert('登入資料解析失敗，請按 Ctrl+Shift+R (Windows) 或 Cmd+Shift+R (Mac) 強制重新整理後再試。');
                console.error('JWT Decode Error:', jwtErr);
                return;
            }
            
            document.getElementById('submitBtn').innerHTML = '<span class="spinner-border spinner-border-sm"></span> 驗證權限中...';
            
            // 🛡️ 第三步：發送驗證請求到 GAS（注意：不可加自訂 header，否則觸發 CORS 預檢導致 GAS 拒絕）
            fetch(CONFIG.GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', email: payload.email })
            }).then(res => {
                // GAS 的回應可能是 text/html（exec 回傳）需要先轉 JSON
                return res.json().catch(() => {
                    throw new Error('GAS 回應不是 JSON，請確認 GAS 專案已重新部署為「網路應用程式」');
                });
            }).then(data => {
                if(data.success) {
                    currentUser = data.user;
                    localStorage.setItem('userEmail', currentUser.email);
                    
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('applicant').value = currentUser.name;
                    document.getElementById('phone').value = currentUser.phone || '';
                    document.getElementById('submitBtn').innerHTML = '<i class="bi bi-cloud-arrow-up"></i> 送出申請並產生PDF';
                    
                    if(document.getElementById('detailsContainer').children.length === 0) {
                        addDetailRow(); 
                    }
                } else {
                    alert(`登入失敗：您的帳號 (${payload.email}) 未登記在系統權限名單中！`);
                    document.getElementById('submitBtn').innerHTML = '無權限';
                }
            }).catch(err => {
                alert('連線失敗：請確認 config.js 中的 GAS 網址是否正確且已重新部署。\n\n詳細錯誤：' + err.message);
                console.error('Fetch Error:', err);
            });
        }

        // 天數計算
        function calcDays() {
            const start = new Date(document.getElementById('startDate').value);
            const end = new Date(document.getElementById('endDate').value);
            if(start && end && end >= start) {
                const diffTime = Math.abs(end - start);
                document.getElementById('totalDays').value = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; 
            } else {
                document.getElementById('totalDays').value = '';
            }
        }

        function addDetailRow() {
            const container = document.getElementById('detailsContainer');
            if(container.children.length >= 10) return alert('最多只能新增 10 筆明細');
            
            const rowDiv = document.createElement('div');
            rowDiv.className = 'detail-card detail-row';
            rowDiv.innerHTML = `
                <div class="d-flex justify-content-between mb-2">
                    <span class="badge bg-secondary">明細</span>
                    <button type="button" class="btn-close" onclick="this.parentElement.parentElement.remove(); calculateTotal();"></button>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-md-2 col-3"><label class="small">月</label><input type="number" class="form-control form-control-sm i-month" placeholder="月" min="1" max="12" required></div>
                    <div class="col-md-2 col-3"><label class="small">日</label><input type="number" class="form-control form-control-sm i-day" placeholder="日" min="1" max="31" required></div>
                    <div class="col-md-4 col-6"><label class="small">起點</label><input type="text" class="form-control form-control-sm i-start"></div>
                    <div class="col-md-4 col-12"><label class="small">迄點</label><input type="text" class="form-control form-control-sm i-end"></div>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-12"><label class="small">訪洽對象及工作紀要</label><input type="text" class="form-control form-control-sm i-desc" required></div>
                </div>
                <div class="row g-2">
                    <div class="col-md-2 col-4"><label class="small text-muted">飛機/高鐵</label><input type="number" class="form-control form-control-sm i-plane fee-input" oninput="calculateTotal()"></div>
                    <div class="col-md-2 col-4"><label class="small text-muted">開車/計程車</label><input type="number" class="form-control form-control-sm i-taxi fee-input" oninput="calculateTotal()"></div>
                    <div class="col-md-2 col-4"><label class="small text-muted">火車/捷運</label><input type="number" class="form-control form-control-sm i-train fee-input" oninput="calculateTotal()"></div>
                    <div class="col-md-2 col-4"><label class="small text-muted">住宿費</label><input type="number" class="form-control form-control-sm i-hotel fee-input" oninput="calculateTotal()"></div>
                    <div class="col-md-2 col-4"><label class="small text-muted">膳雜費</label><input type="number" class="form-control form-control-sm i-meal fee-input" oninput="calculateTotal()"></div>
                    <div class="col-md-2 col-4"><label class="small text-muted">其他費用</label><input type="number" class="form-control form-control-sm i-other fee-input" oninput="calculateTotal()"></div>
                </div>
                <div class="row mt-2"><div class="col-12 text-end text-danger fw-bold small">單筆小計: $<span class="i-subtotal">0</span></div></div>
            `;
            container.appendChild(rowDiv);
        }

        function calculateTotal() {
            let grandTotal = 0;
            document.querySelectorAll('.detail-row').forEach(row => {
                const plane = parseInt(row.querySelector('.i-plane').value) || 0;
                const taxi = parseInt(row.querySelector('.i-taxi').value) || 0;
                const train = parseInt(row.querySelector('.i-train').value) || 0;
                const hotel = parseInt(row.querySelector('.i-hotel').value) || 0;
                const meal = parseInt(row.querySelector('.i-meal').value) || 0;
                const other = parseInt(row.querySelector('.i-other').value) || 0;
                
                const subtotal = plane + taxi + train + hotel + meal + other;
                row.querySelector('.i-subtotal').innerText = subtotal;
                grandTotal += subtotal;
            });
            document.getElementById('totalAmount').value = grandTotal;
        }

        async function handleFiles(event) {
            const files = event.target.files;
            const previewArea = document.getElementById('previewArea');
            for(let i=0; i<files.length; i++) {
                let file = files[i];
                let reader = new FileReader();
                reader.onload = function(e) {
                    let base64String = e.target.result;
                    let mimeType = file.type || (file.name.toLowerCase().endsWith('.pdf') ? 'application/pdf' : '');
                    
                    selectedFiles.push({ name: file.name, mimeType: mimeType, base64: base64String });
                    let div = document.createElement('div');
                    div.className = 'border p-1 position-relative bg-white';
                    
                    let content = mimeType.startsWith('image') ? 
                        `<img src="${base64String}" class="preview-img">` : 
                        `<div class="preview-img d-flex align-items-center justify-content-center bg-light"><i class="bi bi-file-earmark-pdf text-danger fs-3"></i></div>`;
                    
                    div.innerHTML = `${content}<button type="button" class="btn-close position-absolute top-0 start-100 translate-middle" onclick="removeFile(${selectedFiles.length - 1}, this)"></button><div class="small text-truncate" style="width:60px;">${file.name}</div>`;
                    previewArea.appendChild(div);
                };
                reader.readAsDataURL(file);
            }
            event.target.value = ''; 
        }

        function removeFile(index, btnElement) {
            selectedFiles[index] = null; 
            btnElement.parentElement.remove();
        }

        document.getElementById('expenseForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 處理中，請勿關閉網頁...';

            let details = [];
            document.querySelectorAll('.detail-row').forEach(row => {
                details.push({
                    month: row.querySelector('.i-month').value,
                    day: row.querySelector('.i-day').value,
                    startLoc: row.querySelector('.i-start').value,
                    endLoc: row.querySelector('.i-end').value,
                    desc: row.querySelector('.i-desc').value,
                    plane: row.querySelector('.i-plane').value,
                    taxi: row.querySelector('.i-taxi').value,
                    train: row.querySelector('.i-train').value,
                    hotel: row.querySelector('.i-hotel').value,
                    meal: row.querySelector('.i-meal').value,
                    other: row.querySelector('.i-other').value,
                    subtotal: row.querySelector('.i-subtotal').innerText
                });
            });

            const payload = {
                action: 'submit',
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                totalDays: document.getElementById('totalDays').value,
                department: document.getElementById('department').value,
                applicant: document.getElementById('applicant').value,
                phone: document.getElementById('phone').value,
                summary: document.getElementById('summary').value,
                totalAmount: document.getElementById('totalAmount').value,
                details: details,
                files: selectedFiles.filter(f => f !== null)
            };

            try {
                const response = await fetch(CONFIG.GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                if(result.success) {
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 正在合併憑證，請稍候...';
                    
                    const { PDFDocument } = PDFLib;
                    const mainPdfBytes = Uint8Array.from(atob(result.base64Pdf), c => c.charCodeAt(0));
                    const mergedPdf = await PDFDocument.load(mainPdfBytes);
                    
                    for (let file of selectedFiles.filter(f => f !== null)) {
                        try {
                            if (file.mimeType.includes('pdf')) {
                                const attachBytes = Uint8Array.from(atob(file.base64.split(',')[1]), c => c.charCodeAt(0));
                                const attachDoc = await PDFDocument.load(attachBytes);
                                const copiedPages = await mergedPdf.copyPages(attachDoc, attachDoc.getPageIndices());
                                copiedPages.forEach(page => mergedPdf.addPage(page));
                            } else if (file.mimeType.startsWith('image')) {
                                const imgBytes = Uint8Array.from(atob(file.base64.split(',')[1]), c => c.charCodeAt(0));
                                let pdfImage = file.mimeType.includes('png') ? await mergedPdf.embedPng(imgBytes) : await mergedPdf.embedJpg(imgBytes);
                                const page = mergedPdf.addPage();
                                const { width, height } = page.getSize();
                                const scaled = pdfImage.scaleToFit(width - 40, height - 40);
                                page.drawImage(pdfImage, { x: width/2 - scaled.width/2, y: height/2 - scaled.height/2, width: scaled.width, height: scaled.height });
                            }
                        } catch(e) { console.log('附件合併發生錯誤 (可能為密碼保護)：', e); }
                    }
                    
                    const finalPdfBytes = await mergedPdf.save();
                    const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
                    const a = document.createElement('a');
                    a.href = window.URL.createObjectURL(blob);
                    a.download = `${result.formId}_出差旅費報銷單.pdf`;
                    a.click();
                    
                    alert('申請成功！合併完成的 PDF 已下載。');
                    window.location.reload();
                } else {
                    alert('伺服器錯誤: ' + result.message);
                }
            } catch (error) { 
                alert('傳送或合併失敗，請檢查網路連線。' + error); 
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> 送出申請並產生PDF';
            }
        });
    </script>
</body>
</html>
