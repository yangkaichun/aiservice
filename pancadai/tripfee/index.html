<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出憑證黏存單申請</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        body { background-color: #f8f9fa; }
        .form-container { background-color: white; border-radius: 10px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .detail-row { background-color: #f1f3f5; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #loginScreen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* 附件預覽相關的 CSS */
        .preview-wrapper { position: relative; display: inline-block; width: 80px; text-align: center; }
        .preview-item { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; }
        .preview-doc { width: 80px; height: 80px; border-radius: 5px; border: 1px solid #ddd; background-color: #f1f3f5; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .remove-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #dc3545; color: white; border: none; font-size: 14px; line-height: 1; cursor: pointer; z-index: 10; padding: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="form-container text-center" style="max-width: 400px; width: 100%;">
            <h4 class="mb-4">仲智數位健康<br>差旅申請系統</h4>
            <p class="text-muted mb-4">請使用公司授權的 Google 帳號登入</p>
            <div id="g_id_onload" data-context="signin" data-ux_mode="popup" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
            <div id="loginStatus" class="mt-3 text-danger fw-bold"></div>
        </div>
    </div>

    <div class="container mt-4 mb-5 max-w-md d-none" id="mainFormScreen">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8 form-container">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="mb-0">仲智數位健康股份有限公司<br>支出憑證黏存單申請</h3>
                    <button class="btn btn-sm btn-outline-secondary" onclick="logout()">登出</button>
                </div>
                
                <form id="expenseForm">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">申請單位</label>
                            <input type="text" class="form-control" id="department" placeholder="例如: MS" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">申請人姓名</label>
                            <input type="text" class="form-control" id="applicantName" readonly required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">聯絡電話</label>
                            <input type="tel" class="form-control" id="phone" required>
                            <small class="text-muted">由系統自動帶入</small>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">用途摘要</label>
                        <input type="text" class="form-control" id="summary" placeholder="例如: 客戶拜訪/議價/簡報之差旅" required>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">費用明細 (最多 10 筆)</h5>
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addDetailBtn">+ 新增一筆</button>
                    </div>
                    
                    <div id="detailsContainer"></div>

                    <hr>

                    <div class="row mb-4 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">總金額 (自動計算)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" class="form-control fw-bold text-danger" id="totalAmount" readonly value="0">
                            </div>
                        </div>
                        <div class="col-md-6 mt-3 mt-md-0">
                            <label class="form-label">上傳附件 (可依序多選照片或 PDF)</label>
                            <input class="form-control" type="file" id="attachments" accept="image/*,.pdf" multiple>
                            <small class="text-muted">圖片將自動合併至 PDF 中</small>
                            
                            <div id="previewContainer" class="d-flex flex-wrap gap-2 mt-2"></div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <span id="submitText">送出申請</span>
                            <span id="loadingSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </form>

                <div id="successMessage" class="alert alert-success mt-4 d-none" role="alert">
                    <h4 class="alert-heading">申請成功！</h4>
                    <p>您的表單已成功送出並記錄。</p>
                    <hr>
                    <p class="mb-0"><a href="#" id="pdfDownloadLink" target="_blank" class="alert-link">👉 點此查看產出的 PDF 黏存單</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('g_id_onload').setAttribute('data-client_id', CONFIG.GOOGLE_CLIENT_ID);

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        async function handleCredentialResponse(response) {
            const statusDiv = document.getElementById('loginStatus');
            statusDiv.innerText = "驗證權限中，請稍候...";
            
            try {
                const payload = parseJwt(response.credential);
                const userEmail = payload.email;

                const res = await fetch(CONFIG.GAS_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'login', email: userEmail })
                });
                const result = await res.json();

                if (result.status === 'success') {
                    document.getElementById('loginScreen').classList.add('d-none');
                    document.getElementById('mainFormScreen').classList.remove('d-none');
                    document.getElementById('applicantName').value = result.name;
                    document.getElementById('phone').value = result.phone || ""; 
                } else {
                    statusDiv.innerText = result.message; 
                }
            } catch (error) {
                statusDiv.innerText = "系統連線錯誤，請檢查 config.js 中的 GAS 網址是否正確。";
            }
        }

        function logout() { location.reload(); }

        document.addEventListener('DOMContentLoaded', function() {
            const detailsContainer = document.getElementById('detailsContainer');
            const addDetailBtn = document.getElementById('addDetailBtn');
            const totalAmountInput = document.getElementById('totalAmount');
            const expenseForm = document.getElementById('expenseForm');
            
            // --- 新增：維護附件的陣列與預覽邏輯 ---
            let selectedFilesArray = []; 
            const fileInput = document.getElementById('attachments');
            const previewContainer = document.getElementById('previewContainer');

            fileInput.addEventListener('change', function(e) {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    selectedFilesArray.push(file); // 將新選的檔案推入陣列
                });
                renderPreviews();
                fileInput.value = ''; // 清空 input，這樣下次選同一個檔案也能觸發 change 事件
            });

            function renderPreviews() {
                previewContainer.innerHTML = '';
                selectedFilesArray.forEach((file, index) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'preview-wrapper';

                    // 刪除按鈕
                    const removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.className = 'remove-btn';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.onclick = () => {
                        selectedFilesArray.splice(index, 1); // 從陣列中移除
                        renderPreviews(); // 重新渲染
                    };
                    wrapper.appendChild(removeBtn);

                    // 判斷是圖片還是 PDF 以顯示不同預覽
                    if (file.type.startsWith('image/')) {
                        const img = document.createElement('img');
                        img.className = 'preview-item';
                        img.src = URL.createObjectURL(file);
                        wrapper.appendChild(img);
                    } else {
                        const docDiv = document.createElement('div');
                        docDiv.className = 'preview-doc';
                        docDiv.innerHTML = '<span style="font-size: 20px; margin-bottom: 2px;">📄</span><small class="text-truncate w-100 px-1" style="font-size: 10px;" title="'+file.name+'">'+file.name+'</small>';
                        wrapper.appendChild(docDiv);
                    }
                    previewContainer.appendChild(wrapper);
                });
            }
            // -------------------------------------

            let detailCount = 0;
            const MAX_DETAILS = 10; 

            addDetailRow();

            addDetailBtn.addEventListener('click', function() {
                if (detailCount < MAX_DETAILS) addDetailRow();
                else alert('最多只能填寫 10 筆明細喔！');
            });

            function addDetailRow() {
                detailCount++;
                const rowId = `detail_${Date.now()}`;
                const rowHtml = `
                    <div class="detail-row row g-2" id="${rowId}">
                        <div class="col-md-2">
                            <label class="form-label fs-6 mb-1">日期</label>
                            <input type="text" class="form-control form-control-sm detail-date" placeholder="例如: 115.02.25" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fs-6 mb-1">採購說明</label>
                            <input type="text" class="form-control form-control-sm detail-desc" placeholder="說明" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fs-6 mb-1">單價</label>
                            <input type="number" class="form-control form-control-sm detail-price" value="0" min="0" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fs-6 mb-1">數量</label>
                            <input type="number" class="form-control form-control-sm detail-qty" value="1" min="1" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fs-6 mb-1">小計</label>
                            <div class="d-flex align-items-center">
                                <input type="number" class="form-control form-control-sm detail-subtotal me-2" value="0" readonly>
                                ${detailCount > 1 ? `<button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow('${rowId}')">X</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                detailsContainer.insertAdjacentHTML('beforeend', rowHtml);
                attachCalculationListeners();
            }

            window.removeRow = function(rowId) {
                document.getElementById(rowId).remove();
                detailCount--;
                calculateTotal();
            }

            function attachCalculationListeners() {
                document.querySelectorAll('.detail-row').forEach(row => {
                    const priceInput = row.querySelector('.detail-price');
                    const qtyInput = row.querySelector('.detail-qty');
                    priceInput.removeEventListener('input', calculateRow);
                    qtyInput.removeEventListener('input', calculateRow);
                    priceInput.addEventListener('input', calculateRow);
                    qtyInput.addEventListener('input', calculateRow);
                });
            }

            function calculateRow(e) {
                const row = e.target.closest('.detail-row');
                const price = parseFloat(row.querySelector('.detail-price').value) || 0;
                const qty = parseFloat(row.querySelector('.detail-qty').value) || 0;
                row.querySelector('.detail-subtotal').value = price * qty;
                calculateTotal();
            }

            function calculateTotal() {
                let total = 0;
                document.querySelectorAll('.detail-subtotal').forEach(input => total += parseFloat(input.value) || 0);
                totalAmountInput.value = total;
            }

            expenseForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                document.getElementById('submitText').innerText = "上傳並產出PDF中，請稍候...";
                document.getElementById('loadingSpinner').classList.remove('d-none');

                try {
                    const payload = {
                        action: 'submit',
                        department: document.getElementById('department').value,
                        applicantName: document.getElementById('applicantName').value,
                        phone: document.getElementById('phone').value,
                        summary: document.getElementById('summary').value,
                        totalAmount: document.getElementById('totalAmount').value,
                        details: [],
                        attachments: [] 
                    };

                    document.querySelectorAll('.detail-row').forEach(row => {
                        payload.details.push({
                            date: row.querySelector('.detail-date').value,
                            description: row.querySelector('.detail-desc').value,
                            price: row.querySelector('.detail-price').value,
                            quantity: row.querySelector('.detail-qty').value,
                            subtotal: row.querySelector('.detail-subtotal').value
                        });
                    });

                    // --- 修改：改由陣列讀取檔案，而非 input.files ---
                    if (selectedFilesArray.length > 0) {
                        for(let i = 0; i < selectedFilesArray.length; i++) {
                            let file = selectedFilesArray[i];
                            let base64 = await toBase64(file);
                            payload.attachments.push({
                                name: file.name,
                                mimeType: file.type,
                                base64: base64
                            });
                        }
                    }

                    const response = await fetch(CONFIG.GAS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (result.status === 'success') {
                        expenseForm.classList.add('d-none');
                        document.getElementById('successMessage').classList.remove('d-none');
                        document.getElementById('pdfDownloadLink').href = result.pdfUrl;
                    } else {
                        alert("發生錯誤：" + result.message);
                    }
                } catch (error) {
                    alert("系統連線發生錯誤！");
                } finally {
                    submitBtn.disabled = false;
                    document.getElementById('submitText').innerText = "送出申請";
                    document.getElementById('loadingSpinner').classList.add('d-none');
                }
            });

            function toBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
            }
        });
    </script>
</body>
</html>
